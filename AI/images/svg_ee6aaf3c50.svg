<svg width="100%" max-width="650" viewBox="0 0 650 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="650" height="200" fill="#f8f9fa" rx="10"/>
  
  <!-- Raw Text -->
  <rect x="30" y="80" width="120" height="50" rx="5" fill="#fff" stroke="#9e9e9e" stroke-width="2"/>
  <text x="90" y="110" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#212121">"ChatGPT很强"</text>
  <text x="90" y="150" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#757575">人类输入的文本</text>

  <!-- Arrow -->
  <path d="M 160 105 L 200 105" stroke="#757575" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="200,100 210,105 200,110" fill="#757575"/>

  <!-- Tokenizer -->
  <rect x="230" y="60" width="100" height="90" rx="10" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <text x="280" y="110" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#0d47a1">Tokenizer</text>
  <text x="280" y="130" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#0d47a1">(分词与映射)</text>

  <!-- Arrow -->
  <path d="M 340 105 L 380 105" stroke="#757575" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="380,100 390,105 380,110" fill="#757575"/>

  <!-- Tokens & IDs -->
  <!-- Token 1 -->
  <rect x="410" y="40" width="50" height="40" rx="5" fill="#fff3e0" stroke="#ff9800"/>
  <text x="435" y="65" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#e65100">Chat</text>
  <rect x="410" y="90" width="50" height="30" rx="5" fill="#ede7f6" stroke="#673ab7"/>
  <text x="435" y="110" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#4527a0">1254</text>

  <!-- Token 2 -->
  <rect x="465" y="40" width="30" height="40" rx="5" fill="#fff3e0" stroke="#ff9800"/>
  <text x="480" y="65" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#e65100">G</text>
  <rect x="465" y="90" width="30" height="30" rx="5" fill="#ede7f6" stroke="#673ab7"/>
  <text x="480" y="110" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#4527a0">42</text>

  <!-- Token 3 -->
  <rect x="500" y="40" width="40" height="40" rx="5" fill="#fff3e0" stroke="#ff9800"/>
  <text x="520" y="65" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#e65100">PT</text>
  <rect x="500" y="90" width="40" height="30" rx="5" fill="#ede7f6" stroke="#673ab7"/>
  <text x="520" y="110" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#4527a0">879</text>

  <!-- Token 4 -->
  <rect x="545" y="40" width="50" height="40" rx="5" fill="#fff3e0" stroke="#ff9800"/>
  <text x="570" y="65" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#e65100">很强</text>
  <rect x="545" y="90" width="50" height="30" rx="5" fill="#ede7f6" stroke="#673ab7"/>
  <text x="570" y="110" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#4527a0">6632</text>

  <text x="500" y="150" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#757575">切片 (Token)</text>
  <text x="500" y="170" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#757575">数字ID (模型真正看到的)</text>

</svg>
<svg width="100%" max-width="650" viewBox="0 0 650 250" xmlns="http://www.w3.org/2000/svg">
  <rect width="650" height="250" fill="#f8f9fa" rx="10"/>
  
  <!-- Left Side: AI Clients -->
  <rect x="20" y="40" width="120" height="40" rx="5" fill="#e3f2fd" stroke="#2196f3"/>
  <text x="80" y="65" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0d47a1">Claude App</text>

  <rect x="20" y="105" width="120" height="40" rx="5" fill="#e3f2fd" stroke="#2196f3"/>
  <text x="80" y="130" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0d47a1">Cursor (IDE)</text>

  <rect x="20" y="170" width="120" height="40" rx="5" fill="#e3f2fd" stroke="#2196f3"/>
  <text x="80" y="195" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0d47a1">企业私有 AI</text>

  <!-- Center: MCP Protocol -->
  <rect x="240" y="40" width="160" height="170" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="3"/>
  <text x="320" y="115" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#e65100">MCP 统一协议</text>
  <text x="320" y="140" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#e65100">(万能转换器)</text>

  <!-- Arrows Left to Center -->
  <path d="M 140 60 L 240 80" stroke="#757575" stroke-width="2"/>
  <path d="M 140 125 L 240 125" stroke="#757575" stroke-width="2"/>
  <path d="M 140 190 L 240 170" stroke="#757575" stroke-width="2"/>

  <!-- Right Side: Data Sources / Tools -->
  <rect x="500" y="40" width="130" height="40" rx="5" fill="#e8f5e9" stroke="#4caf50"/>
  <text x="565" y="65" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1b5e20">本地 MySQL库</text>

  <rect x="500" y="105" width="130" height="40" rx="5" fill="#e8f5e9" stroke="#4caf50"/>
  <text x="565" y="130" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1b5e20">GitHub 代码仓库</text>

  <rect x="500" y="170" width="130" height="40" rx="5" fill="#e8f5e9" stroke="#4caf50"/>
  <text x="565" y="195" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1b5e20">公司内部 API</text>

  <!-- Arrows Center to Right -->
  <path d="M 400 80 L 500 60" stroke="#757575" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M 400 125 L 500 125" stroke="#757575" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M 400 170 L 500 190" stroke="#757575" stroke-width="2" stroke-dasharray="4,4"/>

</svg>
<svg width="100%" max-width="650" viewBox="0 0 650 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="650" height="350" fill="#f8f9fa" rx="10"/>
  
  <!-- Roles -->
  <rect x="50" y="150" width="80" height="50" rx="25" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <text x="90" y="180" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#0d47a1">用户</text>

  <rect x="250" y="150" width="100" height="50" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="300" y="180" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#e65100">平台 (中转站)</text>

  <rect x="480" y="50" width="100" height="50" rx="10" fill="#ede7f6" stroke="#673ab7" stroke-width="2"/>
  <text x="530" y="80" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#4527a0">大模型</text>

  <rect x="480" y="250" width="100" height="50" rx="10" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="530" y="280" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1b5e20">工具 (Tool)</text>

  <!-- Flow Lines -->
  <!-- User to Platform -->
  <path d="M 130 160 L 240 160" stroke="#757575" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="240,155 250,160 240,165" fill="#757575"/>
  <text x="190" y="150" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#616161">1. 提问天气</text>

  <!-- Platform to User -->
  <path d="M 240 190 L 130 190" stroke="#757575" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="130,185 120,190 130,195" fill="#757575"/>
  <text x="190" y="205" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#616161">8. 最终人话回答</text>

  <!-- Platform to LLM -->
  <path d="M 320 150 L 470 80" stroke="#757575" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="465,75 478,76 470,85" fill="#757575"/>
  <text x="370" y="100" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#616161">2. 发送问题+可用工具列表</text>

  <!-- LLM to Platform -->
  <path d="M 480 95 L 340 160" stroke="#757575" stroke-width="2" stroke-dasharray="4,4"/>
  <polygon points="345,155 332,164 340,150" fill="#757575"/>
  <text x="430" y="145" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#616161">3. 指令: 调天气工具</text>

  <!-- Platform to Tool -->
  <path d="M 340 190 L 470 260" stroke="#757575" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="465,265 478,264 470,255" fill="#757575"/>
  <text x="370" y="240" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#616161">4. 真实调用函数</text>

  <!-- Tool to Platform -->
  <path d="M 480 275 L 320 200" stroke="#757575" stroke-width="2" stroke-dasharray="4,4"/>
  <polygon points="325,205 312,196 320,210" fill="#757575"/>
  <text x="430" y="225" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#616161">5. 返回结果(晴, 25度)</text>

  <!-- Platform to LLM (Result) -->
  <path d="M 300 150 L 480 60" stroke="#2196f3" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="475,55 488,56 480,65" fill="#2196f3"/>
  <text x="350" y="60" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1976d2">6. 传回冰冷的天气数据</text>

  <!-- LLM to Platform (Final) -->
  <path d="M 500 100 L 320 180" stroke="#2196f3" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="325,175 312,184 320,170" fill="#2196f3"/>
  <text x="450" y="115" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1976d2">7. 总结成一句人话</text>

</svg>
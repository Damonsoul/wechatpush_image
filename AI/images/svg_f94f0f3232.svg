<svg width="100%" max-width="650" viewBox="0 0 650 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="650" height="300" fill="#f8f9fa" rx="10"/>

  <!-- Brain/Agent Box -->
  <rect x="250" y="100" width="150" height="100" rx="20" fill="#ede7f6" stroke="#673ab7" stroke-width="3"/>
  <text x="325" y="145" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#4527a0">Agent</text>
  <text x="325" y="170" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#4527a0">(自主智能体)</text>

  <!-- User Input -->
  <rect x="20" y="125" width="120" height="50" rx="5" fill="#e3f2fd" stroke="#2196f3"/>
  <text x="80" y="145" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#0d47a1">复杂任务：</text>
  <text x="80" y="160" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#0d47a1">调研财报并写文件</text>
  
  <path d="M 140 150 L 240 150" stroke="#2196f3" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="240,145 250,150 240,155" fill="#2196f3"/>

  <!-- Cycle Top: Think & Act 1 -->
  <path d="M 325 100 Q 325 30, 480 40" fill="none" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="475,35 485,40 475,45" fill="#ff9800"/>
  <rect x="490" y="20" width="120" height="40" rx="5" fill="#fff3e0" stroke="#ff9800"/>
  <text x="550" y="45" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#e65100">第1步：调用谷歌搜索</text>
  
  <path d="M 490 60 Q 400 90, 400 110" fill="none" stroke="#4caf50" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <polygon points="395,105 400,115 405,105" fill="#4caf50"/>
  <text x="450" y="90" font-family="sans-serif" font-size="10" fill="#2e7d32">拿到网页数据 (Observe)</text>

  <!-- Cycle Bottom: Think & Act 2 -->
  <path d="M 325 200 Q 325 270, 480 260" fill="none" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="475,255 485,260 475,265" fill="#ff9800"/>
  <rect x="490" y="240" width="120" height="40" rx="5" fill="#fff3e0" stroke="#ff9800"/>
  <text x="550" y="265" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#e65100">第2步：调用文件写入</text>

  <path d="M 490 240 Q 400 210, 400 190" fill="none" stroke="#4caf50" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <polygon points="395,195 400,185 405,195" fill="#4caf50"/>
  <text x="450" y="220" font-family="sans-serif" font-size="10" fill="#2e7d32">确认保存成功 (Observe)</text>

  <!-- Final Output -->
  <path d="M 250 170 L 150 240" stroke="#757575" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="155,235 145,245 155,245" fill="#757575"/>
  <rect x="30" y="240" width="100" height="40" rx="5" fill="#e8f5e9" stroke="#4caf50"/>
  <text x="80" y="265" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1b5e20">"任务已圆满完成"</text>

</svg>
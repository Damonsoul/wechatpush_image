<svg width="100%" max-width="650" viewBox="0 0 650 250" xmlns="http://www.w3.org/2000/svg">
  <rect width="650" height="250" fill="#f8f9fa" rx="10"/>

  <!-- Skill Document -->
  <rect x="30" y="30" width="220" height="190" rx="5" fill="#fff" stroke="#90caf9" stroke-width="2"/>
  <line x1="30" y1="60" x2="250" y2="60" stroke="#90caf9" stroke-width="2"/>
  <text x="140" y="50" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1565c0">weekly_report.md (技能文档)</text>

  <text x="40" y="80" font-family="sans-serif" font-size="12" fill="#424242">1. Metadata (名称与描述)</text>
  <text x="50" y="100" font-family="sans-serif" font-size="10" fill="#757575">作用：生成标准化技术周报</text>

  <text x="40" y="130" font-family="sans-serif" font-size="12" fill="#424242">2. Workflow (执行步骤)</text>
  <text x="50" y="150" font-family="sans-serif" font-size="10" fill="#757575">- 读取本周 Git log</text>
  <text x="50" y="165" font-family="sans-serif" font-size="10" fill="#757575">- 读取本周 Calendar</text>

  <text x="40" y="195" font-family="sans-serif" font-size="12" fill="#424242">3. Rules (输出约束)</text>
  <text x="50" y="210" font-family="sans-serif" font-size="10" fill="#757575">强制使用 Markdown 列表格式！</text>

  <!-- Arrow -->
  <path d="M 260 125 L 350 125" stroke="#ff9800" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <polygon points="350,120 360,125 350,130" fill="#ff9800"/>
  <text x="305" y="115" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#f57c00">注入加载</text>

  <!-- Agent Execution -->
  <rect x="370" y="75" width="250" height="100" rx="10" fill="#ede7f6" stroke="#673ab7" stroke-width="2"/>
  <text x="495" y="110" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#4527a0">专属周报助手 (Agent)</text>
  <text x="495" y="135" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#4527a0">“收到！以后只要你喊我写周报，</text>
  <text x="495" y="155" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#4527a0">我就严格按你文档里的规矩办！”</text>

</svg>
<svg width="100%" max-width="900" viewBox="0 0 900 383" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="383">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="100%" stop-color="#F0F4FF"/>
        </linearGradient>
        <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#EEF2FF"/>
            <stop offset="100%" stop-color="#F8FAFC" stop-opacity="0"/>
        </radialGradient>
        <filter id="saas-shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.06"/>
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.04"/>
        </filter>
        <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#7C3AED"/>
            <stop offset="100%" stop-color="#3B82F6"/>
        </linearGradient>
    </defs>

    <rect width="900" height="383" fill="url(#bg-grad)"/>
    <circle cx="450" cy="190" r="300" fill="url(#center-glow)"/>

    <g transform="translate(180, 50)">
        <text x="270" y="55" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="36" fill="#0F172A" font-weight="900" letter-spacing="1">
            Jupyter 的<tspan fill="url(#title-grad)">「宿敌」</tspan>来了
        </text>
        <text x="270" y="95" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="20" fill="#64748B" font-weight="500" letter-spacing="1">
            marimo 反应式 Python 笔记本
        </text>

        <!-- Notebook cell flow diagram -->
        <g transform="translate(70, 130)" filter="url(#saas-shadow)">
            <rect width="400" height="160" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

            <!-- Cell 1 -->
            <rect x="20" y="15" width="100" height="35" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
            <text x="70" y="38" text-anchor="middle" font-family="monospace" font-size="11" fill="#7C3AED">import</text>

            <!-- Arrow down -->
            <path d="M70 50 L70 62" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow-purple)"/>

            <!-- Cell 2 -->
            <rect x="20" y="65" width="140" height="35" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
            <text x="90" y="88" text-anchor="middle" font-family="monospace" font-size="11" fill="#2563EB">df = load_data()</text>

            <!-- Arrow splits -->
            <path d="M90 100 L55 115" stroke="#60A5FA" stroke-width="2"/>
            <path d="M90 100 L155 115" stroke="#60A5FA" stroke-width="2"/>

            <!-- Cell 3a -->
            <rect x="15" y="115" width="80" height="30" rx="6" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1"/>
            <text x="55" y="135" text-anchor="middle" font-family="monospace" font-size="10" fill="#059669">clean</text>

            <!-- Cell 3b -->
            <rect x="120" y="115" width="80" height="30" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
            <text x="160" y="135" text-anchor="middle" font-family="monospace" font-size="10" fill="#D97706">viz</text>

            <!-- Reactive arrow -->
            <path d="M95 130 L120 130" stroke="#F97316" stroke-width="2" stroke-dasharray="4 3"/>
            <text x="108" y="125" font-family="'Microsoft YaHei', sans-serif" font-size="8" fill="#F97316">响应</text>

            <!-- Slider icon -->
            <g transform="translate(250, 20)">
                <rect width="120" height="40" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
                <text x="60" y="16" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#16A34A">交互滑块</text>
                <line x1="20" y1="30" x2="100" y2="30" stroke="#86EFAC" stroke-width="3" stroke-linecap="round"/>
                <circle cx="70" cy="30" r="6" fill="#22C55E" stroke="#FFFFFF" stroke-width="2"/>
            </g>

            <!-- Output chart -->
            <g transform="translate(240, 75)">
                <rect width="130" height="70" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
                <text x="65" y="18" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#64748B">实时图表</text>
                <polyline points="15,55 35,40 55,45 75,25 95,30 115,20" fill="none" stroke="#3B82F6" stroke-width="2"/>
                <polyline points="15,50 35,55 55,35 75,45 95,35 115,40" fill="none" stroke="#A78BFA" stroke-width="2"/>
            </g>
        </g>
    </g>
</svg>

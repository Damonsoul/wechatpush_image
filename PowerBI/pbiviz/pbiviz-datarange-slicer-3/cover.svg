<svg width="900" height="383" viewBox="0 0 900 383" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="900" height="383" fill="#F8FAFC"/>
<!-- Background Grid -->
<path d="M0 40 H900 M0 120 H900 M0 200 H900 M0 280 H900 M0 360 H900" stroke="#E2E8F0" stroke-width="1"/>
<path d="M40 0 V383 M120 0 V383 M200 0 V383 M280 0 V383 M360 0 V383 M440 0 V383 M520 0 V383 M600 0 V383 M680 0 V383 M760 0 V383 M840 0 V383" stroke="#E2E8F0" stroke-width="1"/>

<defs>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
        <feOffset dx="0" dy="4" result="offsetblur"/>
        <feComponentTransfer>
            <feFuncA type="linear" slope="0.08"/>
        </feComponentTransfer>
        <feMerge>
            <feMergeNode/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
</defs>

<!-- Left: The Pain Point (Native Static Slicer) -->
<g filter="url(#card-shadow)" transform="translate(100, 100)">
    <rect x="0" y="0" width="220" height="140" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="2"/>
    <text x="15" y="25" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94A3B8" font-weight="bold">Native Slicer (Static)</text>
    
    <!-- Static Inputs -->
    <rect x="15" y="45" width="85" height="30" rx="3" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="25" y="64" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94A3B8">2023/01/01</text>
    
    <rect x="120" y="45" width="85" height="30" rx="3" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="130" y="64" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94A3B8">2023/12/31</text>
    
    <!-- Dull Slider -->
    <rect x="15" y="95" width="190" height="4" rx="2" fill="#E2E8F0"/>
    <circle cx="15" cy="97" r="6" fill="#CBD5E1"/>
    <circle cx="205" cy="97" r="6" fill="#CBD5E1"/>

    <!-- Warning Tag -->
    <rect x="75" y="115" width="70" height="18" rx="9" fill="#FEE2E2"/>
    <text x="110" y="128" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#EF4444" font-weight="bold">STUCK</text>
</g>

<!-- Arrow Transformation -->
<path d="M350 170 H420" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8"/>
<path d="M410 160 L420 170 L410 180" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

<!-- Right: The Solution (Enhanced Date Range Slicer) -->
<g filter="url(#card-shadow)" transform="translate(460, 60)">
    <rect x="0" y="0" width="320" height="200" rx="12" fill="white"/>
    
    <!-- Window Header -->
    <path d="M0 12 C0 5.37258 5.37258 0 12 0 H308 C314.627 0 320 5.37258 320 12 V35 H0 V12 Z" fill="#F0F9FF"/>
    <text x="15" y="23" font-family="'Segoe UI', sans-serif" font-size="13" fill="#0369A1" font-weight="bold">Date Range Slicer Pro</text>
    <circle cx="280" cy="17" r="4" fill="#3B82F6"/>
    <circle cx="295" cy="17" r="4" fill="#3B82F6" opacity="0.5"/>

    <!-- Quick Picks -->
    <rect x="15" y="55" width="65" height="22" rx="11" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="47" y="70" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#2563EB" font-weight="bold">本月</text>
    
    <rect x="90" y="55" width="65" height="22" rx="11" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="122" y="70" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#64748B">本周</text>

    <rect x="165" y="55" width="65" height="22" rx="11" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="197" y="70" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#64748B">昨天</text>

    <!-- Dynamic Measure Inputs -->
    <rect x="15" y="95" width="130" height="36" rx="4" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2"/>
    <text x="25" y="118" font-family="'Consolas', monospace" font-size="13" fill="#1D4ED8" font-weight="bold">[StartOfMonth]</text>
    
    <path d="M155 113 H165" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>

    <rect x="175" y="95" width="130" height="36" rx="4" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2"/>
    <text x="185" y="118" font-family="'Consolas', monospace" font-size="13" fill="#1D4ED8" font-weight="bold">[Today]</text>

    <!-- Active Slider -->
    <rect x="15" y="160" width="290" height="6" rx="3" fill="#E2E8F0"/>
    <rect x="15" y="160" width="290" height="6" rx="3" fill="#3B82F6"/>
    <circle cx="15" cy="163" r="8" fill="white" stroke="#3B82F6" stroke-width="3" filter="url(#glow)"/>
    <circle cx="305" cy="163" r="8" fill="white" stroke="#3B82F6" stroke-width="3" filter="url(#glow)"/>
</g>

<!-- Title Tag -->
<rect x="635" y="40" width="160" height="30" rx="15" fill="#10B981" filter="url(#card-shadow)"/>
<text x="715" y="60" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="white" font-weight="bold">动态默认时段</text>

<!-- Main Title Text at Bottom -->
<text x="450" y="325" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="32" fill="#1E293B" font-weight="900" letter-spacing="1">Power BI 增强版日期切片器</text>
<text x="450" y="355" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#64748B" letter-spacing="0.5">完美复刻原生体验 · 动态度量值默认日期 · 快捷筛选选项</text>

</svg>
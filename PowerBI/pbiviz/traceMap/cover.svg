<svg width="900" height="383" viewBox="0 0 900 383" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Background -->
<rect width="900" height="383" fill="#F8F9FA"/>

<defs>
    <!-- 渐变流向线：从起点的蓝色渐变到终点的红色 -->
    <linearGradient id="flow-gradient" x1="0" y1="0" x2="1" y2="0.2">
        <stop offset="0%" stop-color="#339AF0"/>
        <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>

    <!-- 阴影滤镜：用于卡片、节点和 Tooltip -->
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
        <feOffset dx="0" dy="4" result="offsetblur"/>
        <feComponentTransfer>
            <feFuncA type="linear" slope="0.12"/>
        </feComponentTransfer>
        <feMerge>
            <feMergeNode/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
    
    <!-- 浅色发光滤镜：用于高亮节点 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="4" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
</defs>

<!-- === THE MAP GRAPHIC (Network & Trajectories) === -->
<g>
    <!-- 背景极简网格 (模拟地图经纬线) -->
    <g stroke="#E9ECEF" stroke-width="1" stroke-dasharray="4 4">
        <path d="M 0 50 H 900 M 0 100 H 900 M 0 150 H 900 M 0 200 H 900 M 0 250 H 900"/>
        <path d="M 150 0 V 383 M 300 0 V 383 M 450 0 V 383 M 600 0 V 383 M 750 0 V 383"/>
    </g>

    <!-- 1. JSON 复杂节点轨迹线 (灰色折线代表底层的物流/路径) -->
    <path d="M 220 180 L 320 230 L 460 210 L 580 250 L 720 150" fill="none" stroke="#ADB5BD" stroke-width="3" stroke-dasharray="6 4" />
    <!-- 途径节点 -->
    <circle cx="320" cy="230" r="4" fill="#868E96" stroke="#F8F9FA" stroke-width="2"/>
    <circle cx="460" cy="210" r="4" fill="#868E96" stroke="#F8F9FA" stroke-width="2"/>
    <circle cx="580" cy="250" r="4" fill="#868E96" stroke="#F8F9FA" stroke-width="2"/>
    <text x="460" y="235" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#ADB5BD">JSON 自定义轨迹</text>

    <!-- 2. 分支流向曲线 (绿色次要流向) -->
    <path d="M 220 180 Q 380 90 540 60" fill="none" stroke="#20C997" stroke-width="3" opacity="0.6"/>
    <path d="M 220 180 Q 380 90 540 60" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.8"/>
    <!-- 次要终点 -->
    <circle cx="540" cy="60" r="10" fill="#20C997" stroke="#FFFFFF" stroke-width="2" filter="url(#card-shadow)"/>

    <!-- 3. 主干贝塞尔流向曲线 (带渐变和动画暗示) -->
    <path d="M 220 180 Q 450 40 720 150" fill="none" stroke="url(#flow-gradient)" stroke-width="7" opacity="0.85"/>
    <!-- 模拟流体动画的虚线 -->
    <path d="M 220 180 Q 450 40 720 150" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-dasharray="10 10" opacity="0.9"/>

    <!-- 4. 节点元素 -->
    <!-- Start Node (蓝) -->
    <!-- 涟漪动画圈 -->
    <circle cx="220" cy="180" r="26" fill="none" stroke="#339AF0" stroke-width="1" opacity="0.4"/>
    <circle cx="220" cy="180" r="38" fill="none" stroke="#339AF0" stroke-width="1" opacity="0.15"/>
    <circle cx="220" cy="180" r="14" fill="#339AF0" stroke="#FFFFFF" stroke-width="3" filter="url(#card-shadow)"/>
    <circle cx="220" cy="180" r="5" fill="#FFFFFF"/>
    <text x="220" y="235" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#495057" font-weight="bold">起点: 成都</text>
    <text x="220" y="252" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#339AF0">WGS84 坐标输入</text>

    <!-- End Node (红) -->
    <circle cx="720" cy="150" r="16" fill="#FF6B6B" stroke="#FFFFFF" stroke-width="3" filter="url(#card-shadow)"/>
    <!-- 定位销内部小点 -->
    <circle cx="720" cy="150" r="6" fill="#FFFFFF"/>
    <text x="720" y="195" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#495057" font-weight="bold">终点: 上海</text>
    <text x="720" y="212" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#FA5252">GCJ02 完美匹配</text>

    <!-- 5. 悬浮提示框 (Tooltip - 暗色毛玻璃效果) -->
    <g transform="translate(390, 45)" filter="url(#card-shadow)">
        <rect x="0" y="0" width="145" height="65" rx="8" fill="#212529" fill-opacity="0.9"/>
        <rect x="0" y="0" width="145" height="65" rx="8" fill="none" stroke="#495057" stroke-width="1"/>
        
        <text x="16" y="24" font-family="'Segoe UI', sans-serif" font-size="13" fill="#F8F9FA" font-weight="bold">🔀 核心干线调拨</text>
        <line x1="16" y1="32" x2="129" y2="32" stroke="#495057" stroke-width="1"/>
        <text x="16" y="50" font-family="'Segoe UI', sans-serif" font-size="11" fill="#ADB5BD">流向权重:</text>
        <text x="80" y="50" font-family="'Segoe UI', sans-serif" font-size="14" fill="#20C997" font-weight="bold">15,000</text>
    </g>
</g>

<!-- === TITLE CARD (Bottom Center - Glassmorphism Light) === -->
<g filter="url(#card-shadow)">
    <!-- White semi-transparent card -->
    <rect x="180" y="270" width="540" height="90" rx="16" fill="white" fill-opacity="0.9" stroke="white" stroke-width="2"/>
    
    <!-- Subtitle / Tagline -->
    <text x="450" y="305" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#339AF0" font-weight="bold" letter-spacing="2">三大坐标系无缝转换 · 多节点精准还原</text>
    
    <!-- Main Title -->
    <text x="450" y="340" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="32" fill="#212529" font-weight="900">POWER BI 高级流向地图</text>
</g>

<!-- Decorative Badges -->
<g transform="translate(680, 255) rotate(12)" filter="url(#card-shadow)">
    <rect x="0" y="0" width="100" height="32" rx="16" fill="#FFD43B"/>
    <text x="50" y="21" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#343A40" font-weight="bold">告别偏移</text>
</g>

<g transform="translate(140, 250) rotate(-10)" filter="url(#card-shadow)">
    <rect x="0" y="0" width="110" height="32" rx="16" fill="#20C997"/>
    <text x="55" y="21" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold">丝滑动态连线</text>
</g>

</svg>
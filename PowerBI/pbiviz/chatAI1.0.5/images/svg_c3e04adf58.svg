<svg width="100%" max-width="900" viewBox="0 0 900 383" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 背景渐变 -->
        <linearGradient id="bg-grad" x1="0" y1="0" x2="900" y2="383" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#0F172A"/>
            <stop offset="50%" stop-color="#020617"/>
            <stop offset="100%" stop-color="#1E1B4B"/>
        </linearGradient>
        
        <!-- 传统流向渐变 (昂贵、限制) -->
        <linearGradient id="old-flow" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#475569"/>
            <stop offset="100%" stop-color="#EF4444"/>
        </linearGradient>

        <!-- 极客流向渐变 (强大、自由) -->
        <linearGradient id="new-flow" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#3B82F6"/>
            <stop offset="50%" stop-color="#10B981"/>
            <stop offset="100%" stop-color="#06B6D4"/>
        </linearGradient>

        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.6"/>
        </filter>
    </defs>

    <!-- 背景 -->
    <rect width="900" height="383" fill="url(#bg-grad)"/>
    <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" stroke-dasharray="4 4">
        <path d="M 0 50 H 900 M 0 100 H 900 M 0 150 H 900 M 0 200 H 900 M 0 250 H 900 M 0 300 H 900"/>
        <path d="M 150 0 V 383 M 300 0 V 383 M 450 0 V 383 M 600 0 V 383 M 750 0 V 383"/>
    </g>

    <!-- === 上半部分：传统的痛苦方案 === -->
    <path d="M 150 90 L 300 90 L 450 90 L 600 90 L 750 140" fill="none" stroke="url(#old-flow)" stroke-width="4" stroke-dasharray="8 6" opacity="0.6"/>
    
    <rect x="250" y="70" width="130" height="40" rx="6" fill="#450a0a" stroke="#EF4444" stroke-width="2"/>
    <text x="315" y="95" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#FCA5A5" font-weight="bold">购买 Premium 容量</text>

    <rect x="420" y="70" width="130" height="40" rx="6" fill="#450a0a" stroke="#EF4444" stroke-width="2"/>
    <text x="485" y="95" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#FCA5A5" font-weight="bold">开启 Copilot 服务</text>

    <rect x="590" y="70" width="130" height="40" rx="6" fill="#450a0a" stroke="#EF4444" stroke-width="2"/>
    <text x="655" y="95" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#FCA5A5" font-weight="bold">单表/无上下文限制</text>
    
    <text x="480" y="55" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94A3B8">官方方案：天价授权 (F64+)、网络受限、定制性差</text>

    <!-- === 下半部分：极客 AI 插件方案 === -->
    <path d="M 150 160 Q 300 240 500 240 T 750 160" fill="none" stroke="url(#new-flow)" stroke-width="8" opacity="0.85" filter="url(#glow)"/>
    <path d="M 150 160 Q 300 240 500 240 T 750 160" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-dasharray="10 10" opacity="0.9"/>

    <!-- 起点：Power BI -->
    <circle cx="150" cy="150" r="35" fill="#1E293B" stroke="#3B82F6" stroke-width="4" filter="url(#shadow)"/>
    <text x="150" y="157" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="18" fill="#60A5FA" font-weight="bold">PBI</text>
    <text x="150" y="210" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94A3B8" font-weight="bold">多表 JSON 喂入</text>

    <!-- 核心节点：自定义视觉对象 -->
    <g transform="translate(420, 215)" filter="url(#shadow)">
        <rect x="-20" y="-5" width="200" height="60" rx="8" fill="#064E3B" stroke="#10B981" stroke-width="2"/>
        <text x="80" y="20" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">ChatAI 视觉对象</text>
        <text x="80" y="40" text-anchor="middle" font-family="monospace" font-size="11" fill="#6EE7B7">DeepSeek / Qwen 直连</text>
    </g>

    <!-- 终点：丰富的 AI 分析 -->
    <circle cx="750" cy="150" r="35" fill="#1E293B" stroke="#06B6D4" stroke-width="4" filter="url(#shadow)"/>
    <text x="750" y="157" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" fill="#2B8A3E">🧠</text>
    <text x="750" y="210" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94A3B8" font-weight="bold">洞察 + 迷你图表</text>

    <!-- === Title Card === -->
    <g filter="url(#shadow)">
        <rect x="180" y="280" width="540" height="85" rx="12" fill="#1E293B" stroke="#38BDF8" stroke-width="2"/>
        <text x="450" y="315" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#38BDF8" font-weight="bold" letter-spacing="2">完美绕开昂贵的 Copilot 授权</text>
        <text x="450" y="348" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="26" fill="#F8FAFC" font-weight="900">属于你的专属数据分析大模型</text>
    </g>

    <!-- Decorative Badge -->
    <g transform="translate(680, 265) rotate(12)" filter="url(#shadow)">
        <rect x="0" y="0" width="100" height="30" rx="15" fill="#FDE047"/>
        <text x="50" y="20" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#1E293B" font-weight="bold">开源发布</text>
    </g>
</svg>
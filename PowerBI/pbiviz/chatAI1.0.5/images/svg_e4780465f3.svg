<svg width="100%" max-width="900" viewBox="0 0 900 383" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 极简纯净背景 -->
        <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="383">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="100%" stop-color="#F8FAFC"/>
        </linearGradient>

        <!-- 中心高光弥散圆 -->
        <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#EFF6FF"/>
            <stop offset="100%" stop-color="#F8FAFC" stop-opacity="0"/>
        </radialGradient>

        <!-- SaaS 卡片极度柔和阴影 -->
        <filter id="saas-shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.06"/>
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.04"/>
        </filter>

        <!-- AI 渐变色 -->
        <linearGradient id="ai-text" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#2563EB"/>
            <stop offset="100%" stop-color="#06B6D4"/>
        </linearGradient>
    </defs>

    <!-- 背景层 -->
    <rect width="900" height="383" fill="url(#bg-grad)"/>
    <circle cx="450" cy="190" r="300" fill="url(#center-glow)"/>

    <!-- === 中心焦点视觉区 === -->
    <g transform="translate(180, 50)">
        
    

        <!-- 核心大标题 -->
        <text x="270" y="75" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="38" fill="#0F172A" font-weight="900" letter-spacing="1">
            把 <tspan fill="url(#ai-text)">AI</tspan> 塞进<tspan fill="url(#ai-text)">PowerBI</tspan>里
        </text>
        
        <!-- 副标题 -->
        <text x="270" y="115" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="20" fill="#64748B" font-weight="500" letter-spacing="1">
            数据对话大脑
        </text>

        <!-- 居中的交互卡片 (代表产品) -->
        <g transform="translate(70, 150)" filter="url(#saas-shadow)">
            <rect width="400" height="130" rx="16" fill="#FFFFFF" stroke="#F1F5F9" stroke-width="2"/>
            
            <!-- 模拟输入框 -->
            <rect x="20" y="20" width="360" height="40" rx="20" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
            <text x="40" y="45" font-family="'Segoe UI', sans-serif" font-size="14" fill="#94A3B8">帮我分析一下上个月利润下降的原因...</text>
            <circle cx="355" cy="40" r="14" fill="#2563EB"/>
            <path d="M352 35 L359 40 L352 45 Z" fill="#FFFFFF"/>

            <!-- 模拟 AI 回复与微型图表 -->
            <rect x="20" y="80" width="160" height="12" rx="4" fill="#E2E8F0"/>
            <rect x="20" y="100" width="100" height="12" rx="4" fill="#E2E8F0"/>
            
            <!-- 迷你柱形图装饰 -->
            <g transform="translate(250, 75)">
                <rect x="0" y="25" width="14" height="20" rx="2" fill="#38BDF8"/>
                <rect x="20" y="10" width="14" height="35" rx="2" fill="#38BDF8"/>
                <rect x="40" y="15" width="14" height="30" rx="2" fill="#38BDF8"/>
                <rect x="60" y="0" width="14" height="45" rx="2" fill="#0EA5E9"/>
            </g>
        </g>

        <!-- 左右浮动的精致点缀图标 -->
        <circle cx="20" cy="200" r="24" fill="#FFFFFF" filter="url(#saas-shadow)"/>
        <text x="20" y="207" text-anchor="middle" font-size="20">📊</text>

        <circle cx="520" cy="170" r="28" fill="#FFFFFF" filter="url(#saas-shadow)"/>
        <text x="520" y="179" text-anchor="middle" font-size="24">✨</text>
    </g>
</svg>

<svg width="100%" max-width="900" viewBox="0 0 900 383" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="383">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="100%" stop-color="#F8FAFC"/>
        </linearGradient>

        <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#EFF6FF"/>
            <stop offset="100%" stop-color="#F8FAFC" stop-opacity="0"/>
        </radialGradient>

        <filter id="saas-shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.06"/>
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.04"/>
        </filter>

        <linearGradient id="gantt-text" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#0078D4"/>
            <stop offset="100%" stop-color="#0EA5E9"/>
        </linearGradient>
    </defs>

    <rect width="900" height="383" fill="url(#bg-grad)"/>
    <circle cx="450" cy="190" r="300" fill="url(#center-glow)"/>

    <g transform="translate(180, 50)">
        
        <text x="270" y="65" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="38" fill="#0F172A" font-weight="900" letter-spacing="1">
            重新定义 <tspan fill="url(#gantt-text)">Power BI</tspan> 项目管理
        </text>
        
        <text x="270" y="105" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="20" fill="#64748B" font-weight="500" letter-spacing="1">
            高级交互式甘特图视觉对象
        </text>

        <g transform="translate(70, 140)" filter="url(#saas-shadow)">
            <rect width="400" height="150" rx="12" fill="#FFFFFF" stroke="#F1F5F9" stroke-width="2"/>
            
            <rect x="0" y="0" width="120" height="150" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" rx="12"/>
            <rect x="0" y="0" width="120" height="150" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
            
            <rect x="10" y="15" width="80" height="8" rx="4" fill="#CBD5E1"/>
            <rect x="20" y="45" width="60" height="6" rx="3" fill="#94A3B8"/>
            <rect x="20" y="75" width="70" height="6" rx="3" fill="#94A3B8"/>
            <rect x="20" y="105" width="50" height="6" rx="3" fill="#94A3B8"/>
            
            <line x1="120" y1="30" x2="400" y2="30" stroke="#E2E8F0" stroke-width="1"/>
            <line x1="200" y1="0" x2="200" y2="150" stroke="#F1F5F9" stroke-width="1"/>
            <line x1="280" y1="0" x2="280" y2="150" stroke="#F1F5F9" stroke-width="1"/>
            <line x1="360" y1="0" x2="360" y2="150" stroke="#F1F5F9" stroke-width="1"/>

            <rect x="130" y="40" width="100" height="16" rx="4" fill="#BAE6FD"/>
            <rect x="130" y="40" width="60" height="16" rx="4" fill="#0EA5E9"/>
            
            <path d="M 230 48 L 245 48 L 245 78 L 255 78" fill="none" stroke="#64748B" stroke-width="2"/>
            <polygon points="255,75 262,78 255,81" fill="#64748B"/>
            
            <rect x="260" y="70" width="90" height="16" rx="4" fill="#BAE6FD"/>
            <rect x="260" y="70" width="30" height="16" rx="4" fill="#0EA5E9"/>

            <polygon points="190,95 198,103 190,111 182,103" fill="#0284C7"/>
        </g>

        <circle cx="20" cy="210" r="24" fill="#FFFFFF" filter="url(#saas-shadow)"/>
        <path d="M12 20h16M16 12h8M12 28h12" stroke="#0EA5E9" stroke-width="3" stroke-linecap="round"/>

        <circle cx="520" cy="170" r="28" fill="#FFFFFF" filter="url(#saas-shadow)"/>
        <circle cx="520" cy="170" r="10" fill="none" stroke="#2563EB" stroke-width="3"/>
        <line x1="520" y1="160" x2="520" y2="170" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
        <line x1="520" y1="170" x2="530" y2="170" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
    </g>
</svg>

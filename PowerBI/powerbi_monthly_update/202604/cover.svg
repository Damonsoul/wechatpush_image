<svg width="900" height="383" viewBox="0 0 900 383" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="900" height="383" fill="#F8F9FA"/>
<!-- Background Grid -->
<path d="M0 191.5 H900 M450 0 V383" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="10 10"/>

<defs>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
        <feOffset dx="0" dy="4" result="offsetblur"/>
        <feComponentTransfer>
            <feFuncA type="linear" slope="0.1"/>
        </feComponentTransfer>
        <feMerge>
            <feMergeNode/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
</defs>

<!-- Left: Visual Layout & Highlight (Represents Card Fixed Size / Interactivity) -->
<g filter="url(#card-shadow)" transform="rotate(-5, 150, 191)">
    <rect x="100" y="100" width="140" height="180" rx="12" fill="white"/>
    <!-- Header -->
    <rect x="110" y="115" width="120" height="24" rx="4" fill="#495057"/>
    <!-- Grid Layout Cards -->
    <rect x="110" y="150" width="55" height="55" rx="8" fill="#E9ECEF"/>
    <!-- Highlighted Selected Card -->
    <rect x="175" y="150" width="55" height="55" rx="8" fill="#339AF0"/>
    <rect x="110" y="215" width="55" height="55" rx="8" fill="#E9ECEF"/>
    <rect x="175" y="215" width="55" height="55" rx="8" fill="#E9ECEF"/>
</g>

<!-- Right: Code Block (DAX Context Updates) -->
<g filter="url(#card-shadow)" transform="rotate(5, 750, 191)">
    <rect x="660" y="110" width="160" height="140" rx="12" fill="#1E293B"/>
    <text x="680" y="145" font-family="'Consolas', monospace" font-size="14" font-weight="bold">
        <tspan fill="#569CD6">NAMEOF</tspan>
        <tspan fill="#D4D4D4">(</tspan>
        <tspan fill="#9CDCFE">Table</tspan>
        <tspan fill="#D4D4D4">)</tspan>
    </text>
    <text x="680" y="175" font-family="'Consolas', monospace" font-size="14" font-weight="bold">
        <tspan fill="#DCDCAA">USERCULTURE</tspan>
        <tspan fill="#D4D4D4">()</tspan>
    </text>
    <rect x="740" y="205" width="60" height="24" rx="4" fill="#F2C811"/>
    <text x="770" y="222" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#343A40">DAX</text>
</g>

<!-- Center Title -->
<g filter="url(#card-shadow)">
    <rect x="250" y="121" width="400" height="140" rx="20" fill="white"/>
    <text x="450" y="170" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="20" fill="#339AF0" font-weight="bold" letter-spacing="2">APRIL 2026 UPDATE</text>
    <text x="450" y="220" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="36" fill="#212529" font-weight="900">Power BI 4月功能更新</text>
</g>

</svg>
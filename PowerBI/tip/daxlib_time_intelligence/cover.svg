<svg width="100%" max-width="900" viewBox="0 0 900 383" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 背景渐变 -->
        <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="383">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="100%" stop-color="#F8FAFC"/>
        </linearGradient>

        <!-- 中心微光效果 -->
        <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#EFF6FF"/>
            <stop offset="100%" stop-color="#F8FAFC" stop-opacity="0"/>
        </radialGradient>

        <!-- SaaS 质感投影 -->
        <filter id="saas-shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.06"/>
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.04"/>
        </filter>

        <!-- 标题渐变色（PowerBI 黄色/橙色） -->
        <linearGradient id="title-text" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#F2C811"/>
            <stop offset="100%" stop-color="#ED7D31"/>
        </linearGradient>

        <!-- DAX 蓝色渐变 -->
        <linearGradient id="dax-blue" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#0078D4"/>
            <stop offset="100%" stop-color="#0EA5E9"/>
        </linearGradient>
    </defs>

    <!-- 背景层 -->
    <rect width="900" height="383" fill="url(#bg-grad)"/>
    <circle cx="450" cy="190" r="300" fill="url(#center-glow)"/>

    <!-- 内容区域 -->
    <g transform="translate(180, 50)">
        <!-- 主标题 -->
        <text x="270" y="55" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="36" fill="#0F172A" font-weight="900" letter-spacing="1">
            34 个<tspan fill="url(#title-text)">时间智能</tspan>度量值
        </text>

        <!-- 副标题 -->
        <text x="270" y="95" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="22" fill="#64748B" font-weight="500" letter-spacing="1">
            一键生成，告别重复劳动
        </text>

        <!-- 示意插图区域：日历 + 代码生成 -->
        <g transform="translate(50, 120)" filter="url(#saas-shadow)">
            <!-- 主卡片 -->
            <rect width="440" height="170" rx="12" fill="#FFFFFF" stroke="#F1F5F9" stroke-width="2"/>

            <!-- 左侧：日历图标 -->
            <g transform="translate(30, 25)">
                <rect width="80" height="80" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
                <rect x="0" y="0" width="80" height="25" rx="8" fill="#F59E0B"/>
                <rect x="0" y="17" width="80" height="8" fill="#F59E0B"/>
                <text x="40" y="18" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#FFFFFF" font-weight="700">6月</text>

                <!-- 日历网格 -->
                <text x="10" y="45" font-family="'Microsoft YaHei', sans-serif" font-size="9" fill="#92400E">一</text>
                <text x="25" y="45" font-family="'Microsoft YaHei', sans-serif" font-size="9" fill="#92400E">二</text>
                <text x="40" y="45" font-family="'Microsoft YaHei', sans-serif" font-size="9" fill="#92400E">三</text>
                <text x="55" y="45" font-family="'Microsoft YaHei', sans-serif" font-size="9" fill="#92400E">四</text>
                <text x="70" y="45" font-family="'Microsoft YaHei', sans-serif" font-size="9" fill="#92400E">五</text>

                <text x="10" y="60" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#78716C">1</text>
                <text x="25" y="60" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#78716C">2</text>
                <text x="40" y="60" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#78716C">3</text>
                <text x="55" y="60" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#78716C">4</text>
                <text x="70" y="60" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#78716C">5</text>

                <text x="10" y="75" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#78716C">8</text>
                <text x="25" y="75" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#78716C">9</text>
                <circle cx="43" cy="72" r="8" fill="#3B82F6"/>
                <text x="40" y="76" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#FFFFFF" font-weight="700">10</text>
                <text x="55" y="75" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#78716C">11</text>
                <text x="70" y="75" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#78716C">12</text>
            </g>

            <!-- 中间：箭头 -->
            <g transform="translate(130, 55)">
                <line x1="0" y1="20" x2="40" y2="20" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
                <polygon points="40,15 50,20 40,25" fill="#3B82F6"/>
            </g>

            <!-- 右侧：代码/度量值列表 -->
            <g transform="translate(190, 20)">
                <rect width="220" height="130" rx="6" fill="#1E293B"/>
                <!-- 代码行 -->
                <rect x="10" y="15" width="80" height="6" rx="3" fill="#94A3B8"/>
                <rect x="10" y="30" width="120" height="6" rx="3" fill="#38BDF8"/>
                <rect x="20" y="45" width="100" height="6" rx="3" fill="#4ADE80"/>
                <rect x="20" y="60" width="80" height="6" rx="3" fill="#4ADE80"/>
                <rect x="20" y="75" width="110" height="6" rx="3" fill="#4ADE80"/>
                <rect x="20" y="90" width="90" height="6" rx="3" fill="#4ADE80"/>
                <rect x="20" y="105" width="70" height="6" rx="3" fill="#4ADE80"/>
                <rect x="10" y="120" width="60" height="6" rx="3" fill="#94A3B8"/>

                <!-- 标签 -->
                <rect x="140" y="45" width="65" height="14" rx="4" fill="#0EA5E9"/>
                <text x="172" y="55" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="8" fill="#FFFFFF" font-weight="700">YTD</text>

                <rect x="140" y="65" width="65" height="14" rx="4" fill="#F59E0B"/>
                <text x="172" y="75" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="8" fill="#FFFFFF" font-weight="700">YOY Δ</text>

                <rect x="140" y="85" width="65" height="14" rx="4" fill="#10B981"/>
                <text x="172" y="95" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="8" fill="#FFFFFF" font-weight="700">MOM %</text>
            </g>

            <!-- 底部标签 -->
            <g transform="translate(150, 148)">
                <rect width="140" height="18" rx="9" fill="#DBEAFE"/>
                <text x="70" y="13" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#1E40AF" font-weight="600">34 个度量值自动生成</text>
            </g>
        </g>

        <!-- 装饰性漂浮图标：闪电 -->
        <circle cx="30" cy="200" r="24" fill="#FFFFFF" filter="url(#saas-shadow)"/>
        <path d="M25 190 L22 200 L28 200 L25 212" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

        <!-- 装饰性漂浮图标：代码 -->
        <circle cx="520" cy="170" r="28" fill="#FFFFFF" filter="url(#saas-shadow)"/>
        <text x="510" y="175" font-family="monospace" font-size="18" fill="#3B82F6" font-weight="700">&lt;/&gt;</text>
    </g>
</svg>

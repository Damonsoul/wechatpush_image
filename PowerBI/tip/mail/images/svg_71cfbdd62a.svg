<svg width="100%" max-width="900" viewBox="0 0 900 383" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Background -->
<rect width="900" height="383" fill="#F8F9FA"/>

<defs>
    <!-- 传统流向渐变 (繁琐、警告) -->
    <linearGradient id="old-flow" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#ADB5BD"/>
        <stop offset="100%" stop-color="#FA5252"/>
    </linearGradient>

    <!-- DAX极简流向渐变 (顺畅、成功) -->
    <linearGradient id="new-flow" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#339AF0"/>
        <stop offset="50%" stop-color="#20C997"/>
        <stop offset="100%" stop-color="#40C057"/>
    </linearGradient>

    <!-- 阴影滤镜 -->
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
        <feOffset dx="0" dy="4" result="offsetblur"/>
        <feComponentTransfer>
            <feFuncA type="linear" slope="0.12"/>
        </feComponentTransfer>
        <feMerge>
            <feMergeNode/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
</defs>

<!-- 背景极简网格 -->
<g stroke="#E9ECEF" stroke-width="1" stroke-dasharray="4 4">
    <path d="M 0 50 H 900 M 0 100 H 900 M 0 150 H 900 M 0 200 H 900 M 0 250 H 900"/>
    <path d="M 150 0 V 383 M 300 0 V 383 M 450 0 V 383 M 600 0 V 383 M 750 0 V 383"/>
</g>

<!-- === 上半部分：传统的痛苦方案 === -->
<path d="M 150 90 L 300 90 L 450 90 L 600 90 L 750 140" fill="none" stroke="url(#old-flow)" stroke-width="4" stroke-dasharray="8 6" opacity="0.6"/>

<rect x="250" y="70" width="120" height="40" rx="6" fill="#FFF5F5" stroke="#FA5252" stroke-width="2"/>
<text x="310" y="95" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#E03131" font-weight="bold">配置 Power Apps</text>

<rect x="420" y="70" width="120" height="40" rx="6" fill="#FFF5F5" stroke="#FA5252" stroke-width="2"/>
<text x="480" y="95" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#E03131" font-weight="bold">买 Premium 授权</text>

<rect x="590" y="70" width="120" height="40" rx="6" fill="#FFF5F5" stroke="#FA5252" stroke-width="2"/>
<text x="650" y="95" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#E03131" font-weight="bold">写 Automate 流</text>

<text x="480" y="55" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#868E96">常规方案：成本高、周期长、维护极其痛苦</text>

<!-- === 下半部分：极简 DAX 方案 === -->
<path d="M 150 160 Q 300 240 500 240 T 750 160" fill="none" stroke="url(#new-flow)" stroke-width="8" opacity="0.85"/>
<path d="M 150 160 Q 300 240 500 240 T 750 160" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-dasharray="10 10" opacity="0.9"/>

<!-- 起点：Power BI -->
<circle cx="150" cy="150" r="30" fill="#F8F9FA" stroke="#339AF0" stroke-width="4" filter="url(#card-shadow)"/>
<text x="150" y="155" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#1864AB" font-weight="bold">PBI</text>
<text x="150" y="200" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#495057" font-weight="bold">触发点击</text>

<!-- 核心节点：一行 DAX -->
<g transform="translate(420, 215)" filter="url(#card-shadow)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="#20C997"/>
    <text x="80" y="22" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">一行 DAX (mailto:)</text>
    <text x="80" y="40" text-anchor="middle" font-family="monospace" font-size="10" fill="#E6FCF5">无代码 / 零授权费用</text>
</g>

<!-- 终点：本地邮件客户端 -->
<circle cx="750" cy="150" r="30" fill="#F8F9FA" stroke="#40C057" stroke-width="4" filter="url(#card-shadow)"/>
<text x="750" y="155" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="20" fill="#2B8A3E">📧</text>
<text x="750" y="200" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#495057" font-weight="bold">带数据的完整邮件</text>

<!-- 悬浮提示框 (Tooltip) -->
<g transform="translate(620, 210)" filter="url(#card-shadow)">
    <rect x="0" y="0" width="130" height="50" rx="6" fill="#212529" fill-opacity="0.9"/>
    <text x="10" y="20" font-family="'Segoe UI', sans-serif" font-size="11" fill="#F8F9FA" font-weight="bold">携带丰富上下文：</text>
    <text x="10" y="38" font-family="'Segoe UI', sans-serif" font-size="10" fill="#20C997">收件人 / 动态正文 / 数据</text>
</g>

<!-- === Title Card === -->
<g filter="url(#card-shadow)">
    <rect x="180" y="280" width="540" height="85" rx="16" fill="white" fill-opacity="0.9" stroke="white" stroke-width="2"/>
    <text x="450" y="315" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#20C997" font-weight="bold" letter-spacing="2">告别 Power Apps / Automate 昂贵组件</text>
    <text x="450" y="348" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="26" fill="#212529" font-weight="900">Power BI 原生动态邮件流</text>
</g>

<!-- Decorative Badge -->
<g transform="translate(680, 265) rotate(12)" filter="url(#card-shadow)">
    <rect x="0" y="0" width="100" height="30" rx="15" fill="#FFD43B"/>
    <text x="50" y="20" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#343A40" font-weight="bold">极客玩法</text>
</g>
</svg>